    <style>
        /* --- GLOBAL RESET & VARS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #1a2942;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --accent-orange: #ff6b35;
            --accent-orange-light: #ff8c42;
            --card-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.2);
            --nav-bg-start: #0d2137;
            --nav-bg-end: #1a3a52;
            --glass-bg: rgba(13, 33, 55, 0.85);
        }

        body.day-mode {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --text-primary: #0d2137;
            --text-secondary: #4a5568;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(13, 33, 55, 0.1);
            --nav-bg-start: #ffffff;
            --nav-bg-end: #f7fafc;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }
        
        html { scroll-behavior: smooth; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            padding-bottom: 120px;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            position: relative;
        }

        /* --- UTILITIES --- */
        .hidden { display: none !important; }
        
        /* --- TOGGLE BUTTONS --- */
        .floating-btn {
            position: fixed;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s, opacity 0.3s;
        }
        .floating-btn:active { transform: scale(0.9); }

        .mode-toggle { top: 20px; left: 20px; background: var(--accent-orange); color: white; font-size: 20px; border: 2px solid white; }
        .scroll-toggle { bottom: 100px; right: 20px; background: var(--nav-bg-start); color: var(--text-primary); border: 1px solid var(--border-color); }
/* 🔥 IFRAME FULLSCREEN CONTAINER 🔥 */
        #iframeContainer {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: var(--bg-primary); 
            z-index: 21000; /* بيفضل تحت الـ Nav Bar اللي خليناه 21000 */
            display: none; 
            flex-direction: column; 
            opacity: 0; 
            transition: opacity 0.4s ease;
            padding-bottom: 70px; /* ✅ إضافة مساحة تحت عشان الـ Nav Bar ميتغطاش */
        }
        
        #iframeContainer.show { display: flex; opacity: 1; }

        #iframeBackBtn {
            background: transparent; 
            border: none; 
            cursor: pointer; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            padding: 8px; 
            transition: 0.3s; 
            position: relative;
        }
        
        #iframeBackBtn:active { transform: scale(0.9); }

        .back-arrow {
            width: 0; 
            height: 0; 
            border-top: 14px solid transparent; 
            border-bottom: 14px solid transparent;
            border-right: 18px solid #4ade80; 
            transition: 0.3s; 
            filter: drop-shadow(0 2px 8px rgba(74, 222, 128, 0.4));
        }
        
        #iframeBackBtn:hover .back-arrow { border-right-color: #22c55e; transform: translateX(-3px); }

        #embeddedFrame { 
            flex: 1; 
            width: 100%; 
            border: none; 
            background: white; 
        }

        /* 🛡️ ERROR MESSAGE 🛡️ */
        #iframeError {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            text-align: center; 
            background: var(--card-bg); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            display: none; 
            z-index: 16000; 
            max-width: 400px; 
            width: 90%;
        }
        
        #iframeError.show { display: block; }
        #iframeError i { font-size: 60px; color: var(--accent-orange); margin-bottom: 20px; }
        #iframeError h3 { font-size: 20px; margin-bottom: 10px; color: var(--text-primary); }
        #iframeError p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        /* --- HOME PAGE --- */
        #homePage { padding: 20px; padding-top: 90px; max-width: 800px; margin: 0 auto; }

        /* --- BANNER CAROUSEL --- */
        .banner-container {
            position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px; min-height: 220px; background: var(--card-bg);
        }
       /* --- BANNER CAROUSEL (Sliding Mode) --- */
        .banner-container {
            position: relative; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px; 
            min-height: 220px; 
            background: var(--bg-secondary);
            display: flex;
        }

        .banner-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); /* حركة انسيابية بروفيشنال */
        }

        .banner-slide {
            flex: 0 0 100%; /* بيخلي كل شريحة تاخد عرض البانر بالكامل */
            width: 100%; 
            height: 220px;
            position: relative;
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            padding: 25px;
            cursor: pointer;
        }

        .banner-slide::after {
            content: ''; 
            position: absolute; 
            top:0; left:0; right:0; bottom:0;
            background: linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0.1)); 
            z-index: 1;
        }

        .banner-content { 
            position: relative; 
            z-index: 2; 
            color: white; 
        }

        .banner-slide h2 { 
            font-size: 24px; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--accent-orange); 
            text-shadow: 1px 1px 2px black; 
        }

        .banner-slide p { 
            font-size: 14px; 
            max-width: 80%; 
            line-height: 1.4; 
        }

        .banner-bg-media { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 0; 
            pointer-events: none; 
        }

        /* --- CONTENT CARDS --- */
        .content-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .content-card {
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 16px;
            padding: 15px; 
            overflow: visible; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
        }

        .card-header h3 { 
            color: var(--accent-orange-light); 
            font-size: 18px; 
            font-weight: 700; 
        }

        .media-container {
            position: relative; 
            width: 100%; 
            min-height: 200px; 
            max-height: 500px; 
            border-radius: 12px;
            overflow: visible; 
            background: rgba(0,0,0,0.05); 
            margin-bottom: 10px; 
            display: flex;
            align-items: center; 
            justify-content: center;
        }

        .media-container img {
            width: 100%; 
            height: auto; 
            max-height: 480px; 
            display: block; 
            object-fit: contain;
            border-radius: 12px; 
            cursor: pointer; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none;
        }

        .media-container video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 12px; 
        }

        .zoom-icon {
            position: absolute; 
            bottom: 15px; 
            right: 15px; 
            background: rgba(0,0,0,0.7); 
            color: var(--accent-orange);

            height: 35px;

            justify-content: center;

            z-index: 10;
        }

        .gallery-dots {
            position: absolute; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%);

            gap: 8px;

            padding: 5px 10px;

        .gallery-dot {

            border-radius: 50%; 
            cursor: pointer; 
        }

        .gallery-dot.active {

        }

        .card-desc { 
            color: var(--text-secondary); 
            font-size: 14px; 
            line-height: 1.5; 
            margin-top: 10px; 
        }
        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 10000;
            display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s;

        }

        /* NEW LOADING HAND CSS */
        .🤚 {
          --skin-color: #E4C560;
          --tap-speed: 0.6s;
          --tap-stagger: 0.1s;
          position: relative;
          width: 80px;
          height: 60px;
        }

        .🤚:before {
          content: '';
          display: block;
          width: 180%;
          height: 75%;
          position: absolute;
          top: 70%;
          right: 20%;
          background-color: black;
          border-radius: 40px 10px;
          filter: blur(10px);
          opacity: 0.3;
        }

        .🌴 {
          display: block;
          width: 100%;
          height: 100%;
          position: absolute;
          top: 0;
          left: 0;
          background-color: var(--skin-color);
          border-radius: 10px 40px;
        }

        .👍 {
          position: absolute;
          width: 120%;
          height: 38px;
          background-color: var(--skin-color);
          bottom: -18%;
          right: 1%;
          transform-origin: calc(100% - 20px) 20px;
          transform: rotate(-20deg);
          border-radius: 30px 20px 20px 10px;
          border-bottom: 2px solid rgba(0, 0, 0, 0.1);
          border-left: 2px solid rgba(0, 0, 0, 0.1);
        }

        .👍:after {
          width: 20%;
          height: 60%;
          content: '';
          background-color: rgba(255, 255, 255, 0.3);
          position: absolute;
          bottom: -8%;
          left: 5px;
          border-radius: 60% 10% 10% 30%;
          border-right: 2px solid rgba(0, 0, 0, 0.05);
        }

        .👉 {
          position: absolute;
          width: 80%;
          height: 35px;
          background-color: var(--skin-color);
          bottom: 32%;
          right: 64%;
          transform-origin: 100% 20px;
          animation-duration: calc(var(--tap-speed) * 2);
          animation-timing-function: ease-in-out;
          animation-iteration-count: infinite;
          transform: rotate(10deg);
        }

        .👉:before {
          content: '';
          position: absolute;
          width: 140%;
          height: 30px;
          background-color: var(--skin-color);
          bottom: 8%;
          right: 65%;
          transform-origin: calc(100% - 20px) 20px;
          transform: rotate(-60deg);
          border-radius: 20px;
        }

        .👉:nth-child(1) {
          animation-delay: 0;
          filter: brightness(70%);
          animation-name: tap-upper-1;
        }

        .👉:nth-child(2) {
          animation-delay: var(--tap-stagger);
          filter: brightness(80%);
          animation-name: tap-upper-2;
        }

        .👉:nth-child(3) {
          animation-delay: calc(var(--tap-stagger) * 2);
          filter: brightness(90%);
          animation-name: tap-upper-3;
        }

        .👉:nth-child(4) {
          animation-delay: calc(var(--tap-stagger) * 3);
          filter: brightness(100%);
          animation-name: tap-upper-4;
        }

        @keyframes tap-upper-1 {
          0%, 50%, 100% { transform: rotate(10deg) scale(0.4); }
          40% { transform: rotate(50deg) scale(0.4); }
        }

        @keyframes tap-upper-2 {
          0%, 50%, 100% { transform: rotate(10deg) scale(0.6); }
          40% { transform: rotate(50deg) scale(0.6); }
        }

        @keyframes tap-upper-3 {
          0%, 50%, 100% { transform: rotate(10deg) scale(0.8); }
          40% { transform: rotate(50deg) scale(0.8); }
        }

        @keyframes tap-upper-4 {
          0%, 50%, 100% { transform: rotate(10deg) scale(1); }
          40% { transform: rotate(50deg) scale(1); }
        }
        
        #floatingBackBtn {

            border: 1px solid var(--border-color); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s;

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    'use strict';

    /* 🔐 SUPABASE CONNECTION */
    const supabaseUrl = 'https://jwbcopyafwheyljvjexo.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3YmNvcHlhZndoZXlsanZqZXhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzcwNDcsImV4cCI6MjA5MDU1MzA0N30.muFXB6elv60C_gxe_2e2Wix_gfQxQ0VGQnZFqlh9dnw';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    /* 📝 DYNAMIC DATA CONTAINER */
    let APP_DATA = { banners: [], content: [] };

window.addEventListener('DOMContentLoaded', async () => {
    // بنخلي اللودر مخفي تماماً في أول فتح للكود
    const loader = document.getElementById('loadingOverlay');
    if (loader) {
        loader.style.display = 'none';
    }

    try {
        await fetchActiveData();
        renderBanners();
        renderContent();
        loadTheme();
    } catch (err) {
        console.error("Connection Error:", err);
        // إظهار رسالة خطأ للمستخدم بدلاً من تعليق الشاشة
        document.getElementById('contentGrid').innerHTML = '<h3 style="text-align:center; color:#ff6b35;">حدث خطأ في تحميل البيانات. يرجى التأكد من اتصالك بالإنترنت.</h3>';
    }
    // شيلنا جزء الـ finally عشان اللودر ما يظهرش ويختفي في البداية خالص
});
    async function fetchActiveData() {
        const now = new Date().toISOString();

        const [bannersRes, contentsRes] = await Promise.all([
            supabaseClient.from('banners').select('*').gte('expires_at', now),
            supabaseClient.from('contents').select('*').gte('expires_at', now)
        ]);

        // معالجة حالة إذا كانت الجداول فارغة تماماً (لتجنب الأخطاء)
        if (bannersRes.data && Array.isArray(bannersRes.data) && bannersRes.data.length > 0) {
            APP_DATA.banners = bannersRes.data.map(b => ({
                title: b.title || "",
                desc: b.description || "",
                link: b.link || "#",
                imageUrl: (b.media_url && b.media_url.match(/\.(jpeg|jpg|gif|png|webp)/i)) ? b.media_url : "",
                videoUrl: (b.media_url && b.media_url.match(/\.(mp4|webm)/i)) ? b.media_url : "",
                color: b.color || "linear-gradient(135deg, #1a2942 0%, #2d4a77 100%)"
            }));
        } else {
            APP_DATA.banners = []; // جدول فارغ
        }

        if (contentsRes.data && Array.isArray(contentsRes.data) && contentsRes.data.length > 0) {
            APP_DATA.content = contentsRes.data.map(c => ({
                type: c.type || "image",
                title: c.title || "",
                desc: c.description || "",
                images: c.type === 'image' && c.media_url ? [c.media_url] : [],
                videoUrl: c.type === 'video' && c.media_url ? c.media_url : "",
                height: "auto"
            }));
        } else {
            APP_DATA.content = []; // جدول فارغ
        }
    }

 function renderBanners() {
    const container = document.getElementById('bannerContainer');
    if (!APP_DATA.banners || APP_DATA.banners.length === 0) {
        container.style.display = 'none';
        return;
    }

    let slidesHtml = '';
    let visibleCount = 0;

    APP_DATA.banners.forEach((banner) => {
        const hasImage = banner.imageUrl && banner.imageUrl.trim() !== '';
        const hasVideo = banner.videoUrl && banner.videoUrl.trim() !== '';
        const hasColor = banner.color && banner.color.trim() !== '';

        if (!hasImage && !hasVideo && !hasColor) return;

        let mediaHTML = '';
        if (hasVideo) {
            mediaHTML = `<video class="banner-bg-media" autoplay muted loop playsinline disablePictureInPicture>
                            <source src="${banner.videoUrl}" type="video/mp4">
                         </video>`;
        } else if (hasImage) {
            mediaHTML = `<img class="banner-bg-media" src="${banner.imageUrl}" alt="${banner.title}">`;
        }

        const bgStyle = (hasImage || hasVideo) ? '' : `background: ${banner.color}`;

        slidesHtml += `
            <div class="banner-slide" style="${bgStyle}" onclick="openLink('${banner.link}')">
                ${mediaHTML}
                <div class="banner-content">
                    <h2>${banner.title}</h2>
                    <p>${banner.desc}</p>
                </div>
            </div>
        `;
        visibleCount++;
    });

    if (visibleCount === 0) {
        container.style.display = 'none';
    } else {
        container.style.display = 'block';
        
        // بناء الهيكل: الصور + حاوية النقط
        container.innerHTML = `
            <div class="banner-wrapper" id="bannerWrapper">${slidesHtml}</div>
            <div class="banner-dots" id="bannerDots"></div>
        `;

        // توليد النقط بناءً على الـ visibleCount
        const dotsContainer = document.getElementById('bannerDots');
        if (dotsContainer) {
            for (let i = 0; i < visibleCount; i++) {
                const dot = document.createElement('div');
                // أول نقطة بتاخد كلاس active أوتوماتيك
                dot.className = `banner-dot ${i === 0 ? 'active' : ''}`;
                // لو المستخدم داس على النقطة يروح للسلايد بتاعها
                dot.onclick = (e) => {
                    e.stopPropagation(); // عشان ميتداخلش مع لينك البانر
                    goToSlide(i);
                };
                dotsContainer.appendChild(dot);
            }
        }
        
        // تشغيل الحركة الأوتوماتيك لو في أكتر من سلايد
        if (visibleCount > 1) {
            startBannerRotation();
        }
    }
}
function renderContent() {
    const grid = document.getElementById('contentGrid');
    grid.innerHTML = ''; 
    
    if (!APP_DATA.content || APP_DATA.content.length === 0) {
        grid.innerHTML = '<p style="text-align:center; color:var(--text-secondary); margin-top:20px;">لا توجد إضافات جديدة حالياً.</p>';
        return;
    }

    APP_DATA.content.forEach((item, idx) => {
        if (item.type === 'video' && (!item.videoUrl || item.videoUrl.trim() === '')) return; 

        const card = document.createElement('div');
        card.className = 'content-card';
        let mediaHTML = '';
        
        if (item.type === 'image') {
            const imgs = item.images || [];
            let imgSlides = '';
            let dots = '';
            if (imgs.length > 0) {
                imgs.forEach((url, i) => {
                    const display = i === 0 ? 'block' : 'none';
                    imgSlides += `<img src="${url}" style="display:${display}" class="gallery-img-${idx} zoomable-img" data-card-idx="${idx}" onclick="openLightbox('${url}')">`;
                    if(imgs.length > 1) dots += `<div class="gallery-dot ${i===0?'active':''}" onclick="changeGallerySlide(${idx}, ${i})"></div>`;
                });
                mediaHTML = `<div class="media-container" style="height: ${item.height || 'auto'}">${imgSlides}<div class="zoom-icon"><i class="fas fa-search-plus"></i></div><div class="gallery-dots" id="dots-${idx}" style="display: ${imgs.length > 1 ? 'flex' : 'none'}">${dots}</div></div>`;
            }
        } else if (item.type === 'video') {
            // تعديل الفيديو في الكروت ليصبح autoplay muted وبدون controls تقليدية لشكل أجمل
            mediaHTML = `<div class="media-container" style="height: 220px">
                            <video autoplay muted loop playsinline style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
                                <source src="${item.videoUrl}" type="video/mp4">
                            </video>
                         </div>`;
        }
        card.innerHTML = `<div class="card-header"><h3>${item.title}</h3></div>${mediaHTML}<p class="card-desc">${item.desc}</p>`;
        grid.appendChild(card);
    });

    setTimeout(() => {
        const allImages = document.querySelectorAll('.zoomable-img');
        allImages.forEach(img => { enablePinchZoomOnImage(img); });
    }, 100);
}
    function changeGallerySlide(cardIdx, imgIdx) {
        const images = document.querySelectorAll(`.gallery-img-${cardIdx}`);
        images.forEach(img => img.style.display = 'none');
        if(images[imgIdx]) images[imgIdx].style.display = 'block';
        const dots = document.getElementById(`dots-${cardIdx}`).children;
        Array.from(dots).forEach(d => d.classList.remove('active'));
        if(dots[imgIdx]) dots[imgIdx].classList.add('active');
    }

    function openLightbox(url) {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        img.src = url;
        enablePinchZoomOnImage(img);
        lb.style.display = 'flex';
        setTimeout(() => lb.classList.add('show'), 10);
    }

    function closeLightbox(event) {
        if (event && event.target.id === 'lightboxImg') return;
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        lb.classList.remove('show');
        setTimeout(() => {
            lb.style.display = 'none';
            img.style.transform = '';
            img.style.transition = '';
        }, 300);
    }

    function enablePinchZoomOnImage(imageElement) {
        if (!imageElement) return;
        let imageScale = 1; let lastScale = 1; let startData = {};
        const getDistance = (event) => Math.hypot(event.touches[0].pageX - event.touches[1].pageX, event.touches[0].pageY - event.touches[1].pageY);

        imageElement.addEventListener('touchstart', (event) => {
            if (event.touches.length === 2) {
                event.preventDefault();
                startData.x = (event.touches[0].pageX + event.touches[1].pageX) / 2;
                startData.y = (event.touches[0].pageY + event.touches[1].pageY) / 2;
                startData.distance = getDistance(event);
                lastScale = imageScale;
            }
        }, { passive: false });

        imageElement.addEventListener('touchmove', (event) => {
            if (event.touches.length === 2) {
                event.preventDefault(); event.stopPropagation();
                let scale = event.scale ? event.scale : getDistance(event) / startData.distance;
                imageScale = Math.min(Math.max(1, lastScale * scale), 5);
                const deltaX = (((event.touches[0].pageX + event.touches[1].pageX) / 2) - startData.x);
                const deltaY = (((event.touches[0].pageY + event.touches[1].pageY) / 2) - startData.y);
                const transform = `translate(${deltaX}px, ${deltaY}px) scale(${imageScale})`;
                imageElement.style.transform = transform; imageElement.style.WebkitTransform = transform;
                imageElement.style.zIndex = "99999"; imageElement.style.transition = "none";
            }
        }, { passive: false });

        imageElement.addEventListener('touchend', (event) => {
            if (event.touches.length < 2 && imageScale <= 1.1) {
                setTimeout(() => {
                    imageElement.style.transform = ""; imageElement.style.WebkitTransform = "";
                    imageElement.style.transition = "transform 0.3s ease"; imageElement.style.zIndex = "";
                    imageScale = 1; lastScale = 1;
                }, 100);
            }
        }, { passive: false });

        let lastTap = 0;
        imageElement.addEventListener('touchend', (event) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                event.preventDefault();
                imageElement.style.transform = ""; imageElement.style.WebkitTransform = "";
                imageElement.style.transition = "transform 0.3s ease"; imageElement.style.zIndex = "";
                imageScale = 1; lastScale = 1;
            }
            lastTap = currentTime;
        });
    }

 let currentBannerIndex = 0;

function startBannerRotation() {
    if (window.bannerInterval) clearInterval(window.bannerInterval);
    
    window.bannerInterval = setInterval(() => {
        const slides = document.querySelectorAll('.banner-slide');
        currentBannerIndex = (currentBannerIndex + 1) % slides.length;
        goToSlide(currentBannerIndex);
    }, 2000);
}

function goToSlide(index) {
    const wrapper = document.getElementById('bannerWrapper');
    if (!wrapper) return;
    
    currentBannerIndex = index;
    wrapper.style.transform = `translateX(-${index * 100}%)`;
    
    // تحديث النقط
    const dots = document.querySelectorAll('.banner-dot');
    dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
    });
}
    function toggleMode() {
        document.body.classList.toggle('day-mode');
        localStorage.setItem('theme', document.body.classList.contains('day-mode') ? 'day' : 'night');
        document.querySelector('#modeToggle i').className = document.body.classList.contains('day-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    function loadTheme() {
        if (localStorage.getItem('theme') === 'day') {
            document.body.classList.add('day-mode');
            document.querySelector('#modeToggle i').className = 'fas fa-sun';
        }
    }

    function toggleNavAndScroll() {
        const nav = document.getElementById('bottomNav');
        const icon = document.querySelector('#scrollBtn i');
        if (!nav.classList.contains('hidden')) {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            nav.classList.add('hidden'); icon.className = 'fas fa-arrow-up';
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            nav.classList.remove('hidden'); icon.className = 'fas fa-arrow-down';
        }
    }

    

    function closeAllMenus() {
        document.getElementById('sectionsMenu').classList.remove('show');
        document.getElementById('overlay').classList.remove('show');
    }

function openLink(url) {
    if (!url || url === '#' || url.trim() === '') return;

    // ✅ السطر ده بيقفل قائمة السكاشن والـ Overlay فوراً أول ما تضغط على أي اختيار
    closeAllMenus();

    // تحديث الحالة النشطة (Active) في الناف بار
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(url)) {
            btn.classList.add('active');
        }
    });

    const container = document.getElementById('iframeContainer');
    const iframe = document.getElementById('embeddedFrame');
    const errorBox = document.getElementById('iframeError');
    const loader = document.getElementById('loadingOverlay');

    errorBox.classList.remove('show');
    
    if (loader) {
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        loader.classList.remove('hidden');
    }
    
    container.classList.add('show');
    iframe.src = url;

    let hasLoaded = false;
    let loadTimeout = setTimeout(() => {
        if (!hasLoaded) {
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.classList.add('hidden');
                    loader.style.display = 'none';
                }, 500);
            }
            errorBox.classList.add('show');
            iframe.src = 'about:blank';
        }
    }, 10000);

    iframe.onload = function() { 
        hasLoaded = true; 
        clearTimeout(loadTimeout); 
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.classList.add('hidden');
                loader.style.display = 'none';
            }, 500);
        }
    };

    iframe.onerror = function() { 
        hasLoaded = true; 
        clearTimeout(loadTimeout); 
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.classList.add('hidden');
                loader.style.display = 'none';
            }, 500);
        }
        errorBox.classList.add('show'); 
        iframe.src = 'about:blank'; 
    };
}
function closeIframe() {
    document.getElementById('iframeContainer').classList.remove('show');
    document.getElementById('iframeError').classList.remove('show');
    setTimeout(() => { document.getElementById('embeddedFrame').src = 'about:blank'; }, 400);
}

function goHome() {
    closeIframe(); 
    closeAllMenus(); 

    // ✅ إرجاع حالة Active لزرار الهوم
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => btn.classList.remove('active'));
    
    // بنختار زرار الهوم تحديداً عشان ينور برتقالي
    const homeBtn = document.querySelector('.nav-btn[onclick="goHome()"]');
    if (homeBtn) homeBtn.classList.add('active');

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ✅ تعديل وظيفة toggleSections عشان تنور لما تفتحها
function toggleSections() {
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => btn.classList.remove('active'));
    
    const sectionsBtn = document.querySelector('.nav-btn[onclick="toggleSections()"]');
    if (sectionsBtn) sectionsBtn.classList.add('active');

    document.getElementById('sectionsMenu').classList.add('show');
    document.getElementById('overlay').classList.add('show');
}
</script>
